<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Shepherd AI — HIPAA Scanner</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700&display=swap" rel="stylesheet"/>
  <style>
    body { font-family: 'Syne', sans-serif; background: #0a0a0a; color: #f0f0f0; }
    .mono { font-family: 'DM Mono', monospace; }
    .spinner { animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .fade-in { animation: fadeIn 0.4s ease forwards; }
    @keyframes fadeIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
  </style>
</head>
<body class="min-h-screen flex flex-col">

  <!-- ── HERO (Day 5) ── -->
  <section class="flex flex-col items-center justify-center px-6 py-24 text-center">

    <div class="mono text-xs text-emerald-400 border border-emerald-800 bg-emerald-950 px-4 py-1.5 rounded-full mb-6 flex items-center gap-2">
      <span class="w-1.5 h-1.5 bg-emerald-400 rounded-full animate-pulse"></span>
      Shepherd AI — HIPAA Compliance Scanner
    </div>

    <h1 class="text-5xl font-bold leading-tight mb-4 tracking-tight">
      Is your API <span class="text-emerald-400">PHI-safe?</span>
    </h1>

    <p class="text-gray-400 text-base max-w-md mb-10 leading-relaxed" style="font-family:sans-serif;">
      Paste your FastAPI URL below and get an instant compliance audit of every route in your OpenAPI spec.
    </p>

    <!-- Input Box -->
    <div class="flex gap-3 w-full max-w-xl">
      <input
  id="urlInput"
  type="text"
  placeholder="https://your-api.com"
  class="mono flex-1 bg-gray-900 border border-gray-700 rounded-lg px-4 py-3 text-sm text-white placeholder-gray-600 focus:outline-none focus:border-emerald-500 transition"
  onclick="this.select()"
/>
      <button
        id="scanBtn"
        onclick="runScan()"
        class="bg-emerald-500 hover:bg-emerald-400 text-black font-bold px-6 py-3 rounded-lg text-sm transition flex items-center gap-2"
      >
        <svg id="spinner" class="spinner hidden w-4 h-4" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"/>
        </svg>
        <span id="btnLabel">Run scan</span>
      </button>
    </div>

    <p id="errorMsg" class="mono text-red-400 text-xs mt-3 hidden"></p>
  </section>

  <!-- ── RESULTS (Day 6) ── -->
  <section id="resultsSection" class="hidden px-6 pb-20 max-w-6xl mx-auto w-full fade-in">

    <!-- Stat Cards -->
    <div class="grid grid-cols-3 gap-4 mb-6">
      <div class="bg-gray-900 border border-gray-800 rounded-xl p-4">
        <p class="mono text-xs text-gray-500 mb-1">Security score</p>
        <p id="statScore" class="text-3xl font-bold text-white">—</p>
      </div>
      <div class="bg-gray-900 border border-gray-800 rounded-xl p-4">
        <p class="mono text-xs text-gray-500 mb-1">Total routes</p>
        <p id="statTotal" class="text-3xl font-bold text-white">—</p>
      </div>
      <div class="bg-gray-900 border border-gray-800 rounded-xl p-4">
        <p class="mono text-xs text-gray-500 mb-1">Unprotected</p>
        <p id="statUnsecured" class="text-3xl font-bold text-red-400">—</p>
      </div>
    </div>

    <!-- Table -->
    <div class="border border-gray-800 rounded-xl overflow-hidden">
      <table class="w-full text-sm" style="table-layout:fixed;">
        <thead class="bg-gray-900 border-b border-gray-800">
          <tr>
            <th class="mono text-left text-xs text-gray-500 px-4 py-3 w-2/5">Route</th>
            <th class="mono text-left text-xs text-gray-500 px-4 py-3 w-1/10">Method</th>
            <th class="mono text-left text-xs text-gray-500 px-4 py-3 w-1/5">Status</th>
            <th class="mono text-left text-xs text-gray-500 px-4 py-3 w-1/5">Risk level</th>
            <th class="mono text-left text-xs text-gray-500 px-4 py-3">Frameworks</th>
          </tr>
        </thead>
        <tbody id="resultsBody" class="divide-y divide-gray-800 bg-black"></tbody>
      </table>
    </div>
  </section>

  <script src="results.js"></script>
</body>
</html>
